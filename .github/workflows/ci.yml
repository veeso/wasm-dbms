name: build_and_test

env:
  RUST_VERSION: 1.94.1

on:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Install Just command runner
        uses: extractions/setup-just@v3

      - name: Check format (nightly)
        run: just fmt_nightly "--check"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Clippy
        run: just clippy "-- -D warnings"

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run unit tests with coverage
        run: |
          cargo llvm-cov \
            --no-fail-fast \
            --workspace \
            --lib \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex '.*(client|macros|example|pocket-ic-tests).*' \
            --exclude "ic-dbms-client" \
            --exclude "ic-dbms-macros" \
            --exclude "pocket-ic-tests" \
            --exclude "dbms-canister-client-integration" \
            --exclude "pocket-ic-tests-macro" \
            --exclude "example" \
            --exclude-from-report "ic-dbms-client" \
            --exclude-from-report "ic-dbms-macros" \
            --exclude-from-report "pocket-ic-tests" \
            --exclude-from-report "pocket-ic-tests-macro" \
            --exclude-from-report "dbms-canister-client-integration" \
            --exclude-from-report "example"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: lcov.info
          retention-days: 1

  doc-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doctest-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run doc tests
        run: cargo test --doc --workspace --exclude wasm-dbms-example-guest

  bench-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build benches
        run: cargo bench --workspace --no-run

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Just command runner
        uses: extractions/setup-just@v3

      - name: Install ic-wasm
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/dfinity/ic-wasm/releases/download/0.9.11/ic-wasm-installer.sh | sh

      - name: Install candid-extractor
        run: |
          wget https://github.com/dfinity/candid-extractor/releases/download/0.1.6/candid-extractor-x86_64-unknown-linux-gnu.tar.gz -O /tmp/candid-extractor-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf /tmp/candid-extractor-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/candid-extractor

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown, wasm32-wasip2

      - name: Build all
        run: just build_all

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: .artifact/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Upload host binary
        uses: actions/upload-artifact@v4
        with:
          name: wasm-example-host
          path: target/release/wasm-dbms-example
          if-no-files-found: error
          retention-days: 1

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts
          path: .artifact/

      - name: Install Just command runner
        uses: extractions/setup-just@v3

      - name: Run integration tests
        run: just integration_test

  wasm-example-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts
          path: .artifact/

      - name: Download host binary
        uses: actions/download-artifact@v4
        with:
          name: wasm-example-host
          path: .bin/

      - name: Run WIT example
        run: |
          chmod +x .bin/wasm-dbms-example
          .bin/wasm-dbms-example ".artifact/wasm-dbms-example-guest.wasm"

  coverage:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: lcov-info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          parallel: false
